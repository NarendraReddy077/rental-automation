<div class="status-card status-card-error">
    <div class="status-icon-wrapper status-icon-wrapper-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
    </div>
    <div class="status-content">
        <h3 class="status-title">Compilation Error</h3>
        <p class="status-description" id="error-message">
            {error_message}
        </p>
    </div>
</div>
